    <script>
    function mintHubDropdownToggle(e) {
      e.stopPropagation();
      const dd = document.getElementById('mintHubDropdown');
      const ch = document.getElementById('mintHubChevron');
      const open = dd.style.display !== 'block';
      dd.style.display = open ? 'block' : 'none';
      if (ch) ch.style.transform = open ? 'rotate(180deg)' : '';
      if (open) {
        setTimeout(() => {
          const close = (ev) => {
            if (!ev.target.closest('.sidebar-header')) {
              dd.style.display = 'none';
              if (ch) ch.style.transform = '';
              document.removeEventListener('click', close);
            }
          };
          document.addEventListener('click', close);
        }, 0);
      }
    }
    function mintAppLaunch() {
      const dd = document.getElementById('mintHubDropdown');
      const ch = document.getElementById('mintHubChevron');
      if (dd) dd.style.display = 'none';
      if (ch) ch.style.transform = '';
      const ov = document.getElementById('mintAppOverlay');
      const fr = document.getElementById('mintAppFrame');
      if (ov && fr) { fr.src = 'https://mint-henna.vercel.app/'; ov.style.display = 'block'; }
    }
    function mintAppClose() {
      const ov = document.getElementById('mintAppOverlay');
      const fr = document.getElementById('mintAppFrame');
      if (ov) ov.style.display = 'none';
      if (fr) fr.src = '';
    }
    </script>

      if (v == null || isNaN(v)) return '—';
      const abs = Math.abs(v);
      if (abs >= 1e6) return `R${(v/1e6).toFixed(1)}M`;
      if (abs >= 10000) return `R${Math.round(v/1e3)}K`;  /* >= R10K → show as K */
      return `R${Math.round(v).toLocaleString('en-ZA')}`;  /* < R10K → show full amount */
    };
    const fmtPct = (v) => {
      if (v == null || isNaN(v)) return '—';
      return (v >= 0 ? '+' : '') + Number(v).toFixed(1) + '%';
    };
    const pctColor = (v) => (v == null || isNaN(v)) ? '#94a3b8' : (v >= 0 ? '#059669' : '#dc2626');

    /* ── Build last N months labels ── */
    function getLastMonthLabels(n) {
      const result = [];
      const now = new Date();
      for (let i = n - 1; i >= 0; i--) {
        const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
        result.push(d.toLocaleDateString('en-US', { month: 'short', year: '2-digit' }));
      }
      return result;
    }

    /* ── Build month list from a start date to now ── */
    function getMonthsSince(startDateStr) {
      if (!startDateStr) return getLastMonthLabels(12);
      const start = new Date(startDateStr);
      const now = new Date();
      const result = [];
      let cur = new Date(start.getFullYear(), start.getMonth(), 1);
      while (cur <= now) {
        result.push(cur.toLocaleDateString('en-US', { month: 'short', year: '2-digit' }));
        cur.setMonth(cur.getMonth() + 1);
      }
      return result.length >= 2 ? result : getLastMonthLabels(12);
    }

    /* ── Convert calendar_returns array into { "YYYY-MM": return_decimal } map ── */
    function buildCalendarMap(calendarReturns) {
      const map = {};
      (calendarReturns || []).forEach(entry => {
        if (entry?.month) map[entry.month] = Number(entry.return ?? 0);
      });
      return map;
    }

    /* ── Build investor-specific monthly returns from daily NAV curve ──────────
       navCurve must already be filtered to the investor's inception date.
       First month return = (end-of-month NAV) / (entry-day NAV) − 1
       Subsequent months  = (end-of-month NAV) / (prev month end NAV) − 1      */
    function buildNavCalMap(navCurve) {
      if (!navCurve || navCurve.length === 0) return {};
      /* Last NAV point per calendar month */
      const byMonth = {};
      navCurve.forEach(p => { byMonth[p.d.slice(0, 7)] = p.v; });
      const months = Object.keys(byMonth).sort();
      const result = {};
      months.forEach((m, i) => {
        const endNav   = byMonth[m];
        const startNav = i === 0 ? navCurve[0].v : byMonth[months[i - 1]];
        if (startNav > 0) result[m] = (endNav - startNav) / startNav;
      });
      return result;
    }

    /* ── Get months from inception to now as [{ month, label, ret }] ── */
    function getMonthsSinceInception(calMap, inceptionDate) {
      const result = [];
      if (!inceptionDate) return result;
      const start = new Date(inceptionDate);
      const now   = new Date();
      let sy = start.getFullYear(), sm = start.getMonth() + 1;
      const ey = now.getFullYear(),  em = now.getMonth() + 1;
      while (sy * 12 + sm <= ey * 12 + em) {
        const key   = `${sy}-${String(sm).padStart(2,'0')}`;
        const label = new Date(sy, sm - 1, 1).toLocaleDateString('en-US', { month: 'short', year: '2-digit' });
        result.push({ month: key, label, ret: calMap[key] ?? null });
        sm++;
        if (sm > 12) { sm = 1; sy++; }
      }
      return result;
    }

    /* ── Build cumulative return series from calendar_returns ── */
    function buildCumulativeSeries(calMap, inceptionDate) {
      const months = [];
      const cumulative = [];
      if (!calMap || Object.keys(calMap).length === 0) return { months, cumulative };
      const sortedKeys = Object.keys(calMap).sort();
      let startKey = sortedKeys[0];
      if (inceptionDate) {
        const id = new Date(inceptionDate);
        const idKey = `${id.getFullYear()}-${String(id.getMonth()+1).padStart(2,'0')}`;
        if (idKey > startKey) startKey = idKey;
      }
      const nowDate = new Date();
      const nowKey = `${nowDate.getFullYear()}-${String(nowDate.getMonth()+1).padStart(2,'0')}`;
      let cum = 0;
      let [sy, sm] = startKey.split('-').map(Number);
      const [ey, em] = nowKey.split('-').map(Number);
      while (sy * 12 + sm <= ey * 12 + em) {
        const key = `${sy}-${String(sm).padStart(2,'0')}`;
        const label = new Date(sy, sm - 1, 1).toLocaleDateString('en-US', { month: 'short', year: '2-digit' });
        if (calMap[key] != null) cum += calMap[key] * 100;
        months.push(label);
        cumulative.push(+cum.toFixed(2));
        sm++;
        if (sm > 12) { sm = 1; sy++; }
      }
      return { months, cumulative };
    }

    /* ── Compute rolling 3-month returns from cumulative ── */
    function buildRolling3M(cumulative) {
      return cumulative.map((v, i) => {
        if (i < 3) return null;
        return +(v - cumulative[i - 3]).toFixed(2);
      });
    }

    /* ── Compute max drawdown from cumulative % series ── */
    function computeMaxDrawdown(cumulative) {
      let peak = -Infinity;
      let maxDD = 0;
      for (const v of cumulative) {
        if (v > peak) peak = v;
        const dd = v - peak;
        if (dd < maxDD) maxDD = dd;
      }
      return maxDD; // negative number, in %
    }

    /* ── Compute drawdown series from cumulative ── */
    function buildDrawdownSeries(cumulative) {
      let peak = -Infinity;
      return cumulative.map(v => {
        if (v > peak) peak = v;
        return +(v - peak).toFixed(2);
      });
    }

    /* ── Compute max drawdown from a raw daily NAV curve [{d, v}] ── */
    function computeNavMaxDrawdown(navCurve) {
      let peak = -Infinity, maxDD = 0;
      navCurve.forEach(({ v }) => {
        if (v > peak) peak = v;
        const dd = peak > 0 ? (v - peak) / peak * 100 : 0;
        if (dd < maxDD) maxDD = dd;
      });
      return maxDD; // negative, in %
    }

    /* ── Build daily drawdown % series from a raw NAV curve [{d, v}] ── */
    function buildNavDrawdownSeries(navCurve) {
      let peak = -Infinity;
      return navCurve.map(({ v }) => {
        if (v > peak) peak = v;
        return peak > 0 ? +((v - peak) / peak * 100).toFixed(2) : 0;
      });
    }

    /* ── YYYY-MM key helpers ── */
    function monthKey(y, m) { return `${y}-${String(m).padStart(2,'0')}`; }

    /* ── Compute period return — investor must have at least nMonths×28 days invested ── */
    function periodReturn(calMap, nMonths, investorDays) {
      /* Day-based gate: require roughly a full period of history */
      if (investorDays == null || investorDays < nMonths * 28) return null;
      const now = new Date();
      /* Accumulate from nMonths ago to this month */
      let sy = now.getFullYear(), sm = now.getMonth() + 1 - (nMonths - 1);
      while (sm <= 0) { sm += 12; sy--; }
      const ey = now.getFullYear(), em = now.getMonth() + 1;
      let cum = 1, hasAny = false;
      while (sy * 12 + sm <= ey * 12 + em) {
        const key = monthKey(sy, sm);
        if (calMap[key] != null) { cum *= (1 + calMap[key]); hasAny = true; }
        sm++; if (sm > 12) { sm = 1; sy++; }
      }
      return hasAny ? (cum - 1) * 100 : null;
    }

    /* ── Compute YTD — investor must have joined on/before Jan 1 of current year ── */
    function ytdReturn(calMap, inceptionDate) {
      if (!inceptionDate) return null;
      const now = new Date();
      const jan1 = new Date(now.getFullYear(), 0, 1);
      /* If investor joined after Jan 1 of this year, YTD predates their entry */
      if (new Date(inceptionDate) > jan1) return null;
      let cum = 1, hasAny = false;
      for (let m = 1; m <= now.getMonth() + 1; m++) {
        const key = monthKey(now.getFullYear(), m);
        if (calMap[key] != null) { cum *= (1 + calMap[key]); hasAny = true; }
      }
      return hasAny ? (cum - 1) * 100 : null;
    }

    /* ─────────────────────────────────────────────────────── */
    /* LOAD ALL INVESTORS                                      */
    /* ─────────────────────────────────────────────────────── */
    async function loadInvestors() {
      const { data: stratList } = await supabaseClient.from('strategies_c').select('id, name, short_name');
      allStrategies = stratList || [];

      /* Fetch active buy holdings with created_at for inception date */
      const { data: holdings } = await supabaseClient
        .from('stock_holdings_c')
        .select('user_id, strategy_id, security_id, quantity, avg_fill, market_value, created_at, as_of_date')
        .eq('is_active', true)
        .eq('trade_side', 'BUY');

      if (!holdings || holdings.length === 0) return [];

      const userIds    = [...new Set(holdings.map(r => r.user_id).filter(Boolean))];
      const secIds     = [...new Set(holdings.map(r => r.security_id).filter(Boolean))];

      /* Fetch profiles, transactions, and live security prices in parallel */
      const [{ data: profiles }, { data: txnRows }, { data: secPrices }, { data: residualRows }, { data: closedRows }] = await Promise.all([
        supabaseClient.from('profiles').select('id, first_name, last_name, email').in('id', userIds),
        supabaseClient
          .from('transactions')
          .select('user_id, amount, direction, status, transaction_date')
          .in('user_id', userIds)
          .eq('direction', 'debit')
          .eq('status',    'posted')
          .gte('amount', 10000),   /* exclude tiny per-share test transactions */
        supabaseClient
          .from('securities_c')
          .select('id, last_price, AsOfTime')
          .in('id', secIds),
        /* Residual cash from rebalances — counts toward current value (same as the app) */
        supabaseClient
          .from('strategy_rebalance_residuals')
          .select('user_id, balance_cents')
          .in('user_id', userIds),
        /* Closed positions carry realised P&L: (avg_exit − avg_fill) × qty (same basis as app + returns job) */
        supabaseClient
          .from('stock_holdings_c')
          .select('user_id, quantity, avg_fill, avg_exit')
          .eq('is_active', false)
          .in('user_id', userIds)
      ]);

      /* Residual cash + accumulated realised P&L per user (rands) */
      const residualByUser = {};
      (residualRows || []).forEach(r => {
        if (!r.user_id) return;
        residualByUser[r.user_id] = (residualByUser[r.user_id] || 0) + Number(r.balance_cents || 0) / 100;
      });
      const realizedByUser = {};
      (closedRows || []).forEach(r => {
        const f = Number(r.avg_fill) || 0, e = Number(r.avg_exit) || 0, q = Number(r.quantity) || 0;
        if (!f || !e || !q) return;
        realizedByUser[r.user_id] = (realizedByUser[r.user_id] || 0) + ((e - f) / 100) * q;
      });

      const profMap = {};
      (profiles || []).forEach(p => { profMap[p.id] = p; });

      /* Live price map: security_id → { price (cents), asOf (timestamp string) } */
      const priceMap = {};
      (secPrices || []).forEach(s => {
        priceMap[s.id] = { price: Number(s.last_price) || 0, asOf: s.AsOfTime };
      });

      /* Sum investment transaction amounts per user — DB stores amounts in ZAR cents.
         Also track the EARLIEST transaction_date as the true "first invested" date. */
      const txnInvested     = {};
      const txnInceptionMap = {};  /* userId → earliest transaction_date (YYYY-MM-DD) */
      (txnRows || []).forEach(t => {
        txnInvested[t.user_id] = (txnInvested[t.user_id] || 0) + Number(t.amount) / 100;
        const d = t.transaction_date ? t.transaction_date.split('T')[0] : null;
        if (d && (!txnInceptionMap[t.user_id] || d < txnInceptionMap[t.user_id])) {
          txnInceptionMap[t.user_id] = d;
        }
      });

      const stratMap = {};
      allStrategies.forEach(s => { stratMap[s.id] = s; });

      /* Group holdings by user — track cost basis, live current value, and earliest holding date */
      const byUser = {};
      holdings.forEach(row => {
        const uid = row.user_id;
        if (!uid) return;
        if (!byUser[uid]) {
          byUser[uid] = {
            userId: uid,
            costBasis: 0,
            current: 0,
            liveAsOf: null,
            strategyId: row.strategy_id,
            inceptionDate: row.created_at
          };
        }
        const mv  = Number(row.market_value) || 0;
        const qty = Number(row.quantity)     || 0;
        let fill  = Number(row.avg_fill)     || 0;
        /* Sanity-check: if avg_fill×qty is >10× market_value, avg_fill is in a larger sub-unit */
        if (fill * qty > 10 * mv && mv > 0) fill /= 100;
        /* avg_fill is stored in ZAR cents — convert to rands for cost basis */
        byUser[uid].costBasis += (fill * qty) / 100;
        /* Use live price from securities table (updated intraday); fall back to stale market_value */
        const livePx = priceMap[row.security_id];
        const liveVal = livePx && livePx.price > 0 ? livePx.price * qty / 100 : mv / 100;
        byUser[uid].current += liveVal;
        /* Track the most recent price timestamp across all holdings (date-safe comparison) */
        if (livePx?.asOf && (!byUser[uid].liveAsOf || new Date(livePx.asOf) > new Date(byUser[uid].liveAsOf))) {
          byUser[uid].liveAsOf = livePx.asOf;
        }
        /* Use the earliest created_at as inception date */
        if (row.created_at && row.created_at < byUser[uid].inceptionDate) {
          byUser[uid].inceptionDate = row.created_at;
        }
        if (!byUser[uid].strategyId && row.strategy_id) byUser[uid].strategyId = row.strategy_id;
      });

      return Object.values(byUser).map(u => {
        const prof  = profMap[u.userId] || {};
        const strat = u.strategyId ? stratMap[u.strategyId] : null;
        const name  = [prof.first_name, prof.last_name].filter(Boolean).join(' ') || prof.email || u.userId;

        /* Transaction date is the authoritative "first invested" date; fall back to holdings created_at */
        const inceptionDate = txnInceptionMap[u.userId]
          || (u.inceptionDate ? u.inceptionDate.split('T')[0] : null);
        const days = inceptionDate ? Math.floor((Date.now() - new Date(inceptionDate)) / 86400000) : 0;

        /* ── Stable money-in → money-out P&L (matches the Mint app) ──
           invested is anchored to the investor's actual deposits, NOT recomputed
           from the cost of only the shares still held (which silently drops sold
           shares on every rebalance and makes the % drift). Current value includes
           rebalance residual cash so a rebalance doesn't look like a loss. */
        const residualVal = residualByUser[u.userId] || 0;
        const currentVal  = u.current + residualVal;
        const invested    = (txnInvested[u.userId] > 0 ? txnInvested[u.userId] : u.costBasis);
        const pnl         = +(currentVal - invested).toFixed(2);
        const returnPct   = invested > 0 ? +((pnl / invested) * 100).toFixed(2) : 0;

        /* Split into realised (locked in from sells) + unrealised (open positions) */
        const realized   = +((realizedByUser[u.userId] || 0).toFixed(2));
        const unrealized = +((pnl - realized).toFixed(2));

        /* Geometric annualisation: ((1 + r)^(365/days) − 1) × 100 */
        const annualised = days > 30
          ? +(((Math.pow(1 + returnPct / 100, 365 / days) - 1) * 100)).toFixed(2)
          : returnPct;

        /* Skip users with no strategy — they hold individual assets, not a managed strategy */
        if (!u.strategyId) return null;

        return {
          userId: u.userId,
          name,
          strategy: strat?.short_name || strat?.name || '—',
          strategyId: u.strategyId,
          value: fmtR(currentVal),
          valueFull: currentVal,
          invested,
          current: currentVal,
          residualCash: residualVal,
          pnl,
          realized,
          unrealized,
          returnPct,
          days,
          annualised,
          inceptionDate,
          liveAsOf: u.liveAsOf || null
        };
      }).filter(Boolean).sort((a, b) => b.valueFull - a.valueFull);
    }

    /* ─────────────────────────────────────────────────────── */
    /* KPI BAR                                                 */
    /* ─────────────────────────────────────────────────────── */
    function renderKpiBar(investors) {
      const aum  = investors.reduce((s, i) => s + (i.current || 0), 0);
      const inv  = investors.reduce((s, i) => s + (i.invested || 0), 0);
      const pnl  = aum - inv;
      const realised   = investors.reduce((s, i) => s + (i.realized || 0), 0);
      const unrealised = investors.reduce((s, i) => s + (i.unrealized || 0), 0);
      const avg  = investors.length ? investors.reduce((s, i) => s + i.returnPct, 0) / investors.length : 0;
      const sorted = [...investors].sort((a, b) => b.returnPct - a.returnPct);
      const best = sorted[0];
      const worst = sorted[sorted.length - 1];
      const kpis = [
        { l: 'TOTAL AUM',       v: fmtR(aum),    c: '#0f172a' },
        { l: 'TOTAL INVESTED',  v: fmtR(inv),     c: '#64748b' },
        { l: 'TOTAL P&L',       v: (pnl >= 0 ? '+' : '') + fmtR(pnl), c: pnl >= 0 ? '#059669' : '#dc2626' },
        { l: 'REALISED P&L',    v: (realised >= 0 ? '+' : '') + fmtR(realised), c: realised >= 0 ? '#059669' : '#dc2626' },
        { l: 'UNREALISED P&L',  v: (unrealised >= 0 ? '+' : '') + fmtR(unrealised), c: unrealised >= 0 ? '#059669' : '#dc2626' },
        { l: 'AVG RETURN',      v: fmtPct(avg),   c: avg >= 0 ? '#059669' : '#dc2626' },
        { l: 'BEST PERFORMER',  v: best  ? `${best.name.split(' ')[0]} ${fmtPct(best.returnPct)}`  : '—', c: '#059669' },
        { l: 'WORST PERFORMER', v: worst ? `${worst.name.split(' ')[0]} ${fmtPct(worst.returnPct)}` : '—', c: '#dc2626' }
      ];
      document.getElementById('kpiBar').innerHTML = kpis.map(k =>
        `<div class="ov-kpi-card"><div style="font-size:10px;color:#94a3b8;font-weight:500;margin-bottom:5px;">${k.l}</div><div style="font-size:14px;font-weight:700;color:${k.c};font-family:ui-monospace,monospace;">${k.v}</div></div>`
      ).join('');
    }

    /* ─────────────────────────────────────────────────────── */
    /* INVESTOR LIST                                           */
    /* ─────────────────────────────────────────────────────── */
    function renderInvestorList(investors) {
      const searchTerm  = document.getElementById('investorSearch').value.toLowerCase();
      const stratFilter = document.getElementById('strategyFilter').value;
      const filtered = investors.filter(i =>
        i.name.toLowerCase().includes(searchTerm) &&
        (!stratFilter || i.strategy === stratFilter || i.strategyId === stratFilter)
      );

      document.getElementById('investorList').innerHTML = filtered.map(i => `
        <div onclick="selectInvestor('${i.userId}')"
          style="display:flex;align-items:center;justify-content:space-between;padding:9px 10px;border-radius:8px;cursor:pointer;
            border-left:3px solid ${currentInvestor?.userId === i.userId ? '#7c3aed' : 'transparent'};
            background:${currentInvestor?.userId === i.userId ? '#ede9fe' : 'transparent'};transition:background 0.12s;">
          <div>
            <div style="font-size:12px;font-weight:600;color:#0f172a;">${i.name}</div>
            <div style="font-size:10px;color:#94a3b8;margin-top:1px;">${i.strategy}</div>
          </div>
          <div style="text-align:right;">
            <div style="font-size:12px;font-weight:600;color:#0f172a;font-family:ui-monospace,monospace;">${i.value}</div>
            <div style="font-size:10px;font-weight:600;color:${pctColor(i.returnPct)};">${fmtPct(i.returnPct)}</div>

    }

    /* ─────────────────────────────────────────────────────── */
    /* SELECT INVESTOR — fetch real analytics + transactions   */
    /* ─────────────────────────────────────────────────────── */
    async function selectInvestor(userId, { silent = false } = {}) {
      const investor = allInvestors.find(i => i.userId === userId);
      if (!investor) return;

      /* Show loading state only for user-initiated selections, not background refreshes */
      const dp = document.getElementById('detailPanel');
      if (!silent) {
        dp.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100%;gap:12px;">
          <div style="width:20px;height:20px;border:2px solid #7c3aed;border-top-color:transparent;border-radius:50%;animation:spin 0.7s linear infinite;"></div>
          <span style="font-size:13px;color:#64748b;">Loading investor data…</span>
        </div>`;
      }

      /* 1. Strategy holdings (for allocation tab) */
      const { data: stratData } = await supabaseClient
        .from('strategies_c')
        .select('holdings, name, short_name')
        .eq('id', investor.strategyId)
        .maybeSingle();

      const holdingColors = ['#2563eb','#7c3aed','#059669','#f97316','#ef4444','#eab308','#06b6d4','#475569'];
      const sectorMap = {
        'NPN':'Technology','PRX':'Technology','MTN':'Telecoms','STXNDQ':'Technology','STX500':'Diversified',
        'CFR':'Luxury Goods','BHP':'Resources','GLN':'Resources','AGL':'Resources','SOL':'Energy','EXX':'Resources',
        'ANG':'Mining','IMP':'Mining','SSW':'Mining','GFI':'Mining',
        'SBK':'Financials','FSR':'Financials','NED':'Financials','ABG':'Financials','INL':'Financials',
        'CML':'Financials','DIB':'Financials','CLI':'Financials','GRT':'Real Estate',
        'MRP':'Consumer','SHP':'Consumer','WHL':'Consumer','SPP':'Consumer','SUI':'Consumer',
        'VKE':'Real Estate','NEPI':'Real Estate'
      };

      let stratHoldings = (stratData?.holdings && Array.isArray(stratData.holdings) && stratData.holdings.length > 0)
        ? JSON.parse(JSON.stringify(stratData.holdings))
        : [];

      stratHoldings.forEach((h, idx) => {
        const rawTicker = h.ticker || h.symbol || h.code || 'N/A';
        h.ticker = rawTicker.split('.')[0];
        if (!h.sector || h.sector === 'Other') h.sector = sectorMap[h.ticker] || 'Other';
        if (!h.color) h.color = holdingColors[idx % holdingColors.length];
      });
      investor.strategyHoldings = stratHoldings;

      /* 2. Strategy analytics (real period returns, calendar data, risk metrics) */
      let analytics = null;
      if (investor.strategyId) {
        const { data: analyticsRow } = await supabaseClient
          .from('strategy_analytics')
          .select('strategy_id, as_of_date, latest_value, ytd_return, summary, curves, calendar_returns, computed_at, error')
          .eq('strategy_id', investor.strategyId)
          .maybeSingle();
        analytics = (analyticsRow && !analyticsRow.error) ? analyticsRow : null;
      }
      investor.analytics = analytics;

      /* ── Build full merged daily NAV curve from all timeframe buckets ── */
      const mergedNavPts = {};
      const rawCurves = analytics?.curves || {};
      ['YTD', '6M', '3M', '1M', '1W'].forEach(key => {
        (rawCurves[key] || []).forEach(p => {
          if (!(p.d in mergedNavPts)) mergedNavPts[p.d] = p.v;
        });
      });
      const fullNavCurve = Object.entries(mergedNavPts)
        .sort((a, b) => a[0].localeCompare(b[0]))
        .map(([d, v]) => ({ d, v }));

      /* Filter to investor's inception date for investor-specific computations */
      investor.navCurve = investor.inceptionDate
        ? fullNavCurve.filter(p => p.d >= investor.inceptionDate)
        : fullNavCurve;

      /* ── navCalMap: investor-specific monthly returns from daily NAV (primary source)
              Falls back to stored calendar_returns if no curve data available         ── */
      const navCalMap = buildNavCalMap(investor.navCurve);
      const calMap    = buildCalendarMap(analytics?.calendar_returns); // fallback
      const activeMap = Object.keys(navCalMap).length > 0 ? navCalMap : calMap;
      investor.calMap = activeMap;

      /* Compute period returns — gated by actual days invested */
      const ret1M  = periodReturn(activeMap, 1,  investor.days);
      const ret3M  = periodReturn(activeMap, 3,  investor.days);
      const ret6M  = periodReturn(activeMap, 6,  investor.days);
      const retYTD = ytdReturn(activeMap, investor.inceptionDate);
      const ret1Y  = periodReturn(activeMap, 12, investor.days);
      /* ITD = investor's actual personal return from holdings */
      const retITD = investor.returnPct;

      investor.periodReturns = { ret1M, ret3M, ret6M, retYTD, ret1Y, retITD };

      /* Cumulative monthly series (for bar chart) */
      const { months: cumMonths, cumulative } = buildCumulativeSeries(activeMap, investor.inceptionDate);
      investor.cumMonths = cumMonths;
      investor.cumulative = cumulative;

      /* Max drawdown: daily NAV is most accurate */
      if (investor.navCurve.length > 1) {
        investor.maxDD = computeNavMaxDrawdown(investor.navCurve);
      } else if (cumulative.length > 1) {
        investor.maxDD = computeMaxDrawdown(cumulative);
      } else {
        investor.maxDD = null;
      }

      /* 3. Transactions & Trades */
      const [{ data: txRows }, { data: tradeRows }] = await Promise.all([
        supabaseClient
          .from('transactions')
          .select('*')
          .eq('user_id', investor.userId)
          .order('created_at', { ascending: false }),
        supabaseClient
          .from('stock_holdings_c')
          .select('*, securities(code, description)')
          .eq('user_id', investor.userId)
          .eq('Status', 'inactive')
          .eq('is_active', false)
          .not('closed_reason', 'is', null) // Only actual trades
      ]);

      const allTxRecords = [];

      // Add records from transactions table
      (txRows || []).forEach(row => {
        let typeLabel = row.name || row.type || 'Transaction';
        if (row.type === 'DEPOSIT' || typeLabel.toLowerCase().includes('deposit')) typeLabel = 'Subscription';
        if (row.type === 'WITHDRAWAL' || typeLabel.toLowerCase().includes('withdraw')) typeLabel = 'Withdrawal';
        if (typeLabel.toLowerCase().includes('investment')) typeLabel = 'Investment';

        const amt = Number(row.amount || 0) / 100;
        let units = '—', nav = '—';
        if (row.description && typeof row.description === 'string' && row.description.startsWith('{')) {
          try {
            const meta = JSON.parse(row.description);
            if (meta.shareCount) units = meta.shareCount;
            if (meta.price || meta.nav) nav = Number(meta.price || meta.nav).toFixed(2);
          } catch(e) {}
        }

        allTxRecords.push({
          rawDate: new Date(row.created_at || row.transaction_date),
          date: new Date(row.created_at || row.transaction_date).toLocaleDateString('en-ZA', { day: 'numeric', month: 'short', year: 'numeric' }),
          type: typeLabel,
          amount: 'R' + Math.abs(amt).toLocaleString('en-ZA', { maximumFractionDigits: 0 }),
          units,
          nav
        });
      });

      // Add records from stock_holdings_c (Rebalance Trades)
      (tradeRows || []).forEach(row => {
        const isBuy = String(row.trade_side).toUpperCase() === 'BUY';
        const qty = Number(row.quantity || 0);
        // Use avg_fill for buys, avg_exit for sells
        const priceCents = isBuy ? Number(row.avg_fill || 0) : Number(row.avg_exit || row.avg_fill || 0);
        const totalRands = (qty * priceCents) / 100;
        const ticker = (row.securities?.code || 'Share').replace(/\.[A-Z]+$/i, "");

        allTxRecords.push({
          rawDate: new Date(row.updated_at || row.created_at),
          date: new Date(row.updated_at || row.created_at).toLocaleDateString('en-ZA', { day: 'numeric', month: 'short', year: 'numeric' }),
          type: isBuy ? `Buy ${ticker}` : `Sell ${ticker}`,
          amount: 'R' + Math.abs(totalRands).toLocaleString('en-ZA', { maximumFractionDigits: 0 }),
          units: qty.toLocaleString(),
          nav: (priceCents / 100).toFixed(2)
        });
      });

      // Sort newest first
      investor.transactions = allTxRecords.sort((a, b) => b.rawDate - a.rawDate);

      currentInvestor = investor;
      renderInvestorList(allInvestors);
      renderDetail();
    }

                        <span style="font-size:11px;font-weight:600;color:#0f172a;">${s.name}</span>
                      </div>
                      <span style="font-size:11px;font-weight:700;color:#0f172a;">${s.weight.toFixed(1)}%</span>
                    </div>
                    <div style="height:4px;background:#f1f5f9;border-radius:2px;overflow:hidden;">
                      <div style="width:${s.weight}%;height:100%;background:${s.color};"></div>
                    </div>
                  </div>
                `).join('')}
              </div>
            </div>
          </div>
        `;
        setTimeout(() => initAllocChart(), 50);

      } else if (currentTab === 'transactions') {
        const txs = inv.transactions || [];
        const txBody = txs.length > 0
          ? txs.map(t => {
              const style = t.type === 'Subscription'
                ? 'background:#ede9fe;color:#7c3aed;'
                : t.type === 'Withdrawal'
                  ? 'background:#fee2e2;color:#dc2626;'
                  : 'background:#f1f5f9;color:#64748b;';
              return `<tr>
                <td>${t.date}</td>
                <td><span style="${style}padding:2px 8px;border-radius:12px;font-size:9px;font-weight:700;">${t.type}</span></td>
                <td class="r ov-mono">${t.amount}</td>
                <td class="r ov-mono">${t.units}</td>
                <td class="r ov-mono">${t.nav}</td>
              </tr>`;
            }).join('')
          : `<tr><td colspan="5" style="text-align:center;padding:20px;color:#94a3b8;">No transactions found for this investor.</td></tr>`;
        tc.innerHTML = `
          <div style="font-size:13px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:6px;">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#475569" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
            Transaction History
          </div>
          <table class="ov-table">
            <thead><tr><th>Date</th><th>Type</th><th class="r">Amount</th><th class="r">Units</th><th class="r">NAV</th></tr></thead>
            <tbody>${txBody}</tbody>
          </table>`;
      }
    }

    /* ─────────────────────────────────────────────────────── */
    /* CHARTS                                                  */
    /* ─────────────────────────────────────────────────────── */
    function initPerfChart(months, cumulative, inceptionDate) {
      const el = document.getElementById('perfChartEl');
      if (!el) return;
      if (window._perfChart) { try { window._perfChart.dispose(); } catch(e) {} }
      const chart = echarts.init(el);
      window._perfChart = chart;

      if (!months || months.length === 0) {
        chart.setOption({
          graphic: [{ type: 'text', left: 'center', top: 'middle', style: { text: 'No performance data available yet.', fill: '#94a3b8', fontSize: 13 } }]
        });
        return;
      }

      /* Format inception date as short label e.g. "15 Jan '23" */
      const inceptionLabel = inceptionDate
        ? new Date(inceptionDate).toLocaleDateString('en-ZA', { day: 'numeric', month: 'short', year: '2-digit' })
        : '';

      /* Anchor line to 0 at inception so it draws up/down from the baseline */
      const chartMonths = [inceptionLabel, ...months];
      const chartData   = [0, ...cumulative];

      chart.setOption({
        animation: false,
        title: { text: 'Cumulative Strategy Return', textStyle: { fontSize: 13, fontWeight: 700, color: '#0f172a' }, left: 0, top: 0 },
        grid: { top: 50, right: 20, bottom: 40, left: 50 },
        tooltip: { trigger: 'axis', formatter: (params) => {
          const p = params[0];
          if (p.dataIndex === 0) return `${p.axisValue || 'Inception'}: <b>0.00%</b>`;
          return `${p.axisValue}<br/>${p.seriesName}: <b>${p.value >= 0 ? '+' : ''}${p.value}%</b>`;
        }},
        xAxis: { type: 'category', data: chartMonths, boundaryGap: false, axisLine: { lineStyle: { color: '#e2e8f0' } }, axisTick: { show: false }, axisLabel: { color: '#94a3b8', fontSize: 10, interval: Math.ceil(chartMonths.length / 8) } },
        yAxis: { type: 'value', axisLabel: { color: '#94a3b8', fontSize: 10, formatter: '{value}%' }, splitLine: { lineStyle: { type: 'dashed', color: '#f1f5f9' } }, min: v => Math.min(0, v.min) },
        series: [{
          name: 'Strategy',
          type: 'line',
          data: chartData,
          symbol: 'none',
          smooth: true,
          lineStyle: { color: '#2563eb', width: 2 },
          areaStyle: { color: new echarts.graphic.LinearGradient(0,0,0,1,[{ offset:0, color:'rgba(37,99,235,0.12)' },{ offset:1, color:'rgba(37,99,235,0)' }]) }
        }]
      });
      new ResizeObserver(() => chart.resize()).observe(el);
    }

    function initRollingChart(months, rolling) {
      const el = document.getElementById('rollingChartEl');
      if (!el) return;
      if (window._rollChart) { try { window._rollChart.dispose(); } catch(e) {} }
      const chart = echarts.init(el);
      window._rollChart = chart;

      if (!months || months.length < 4) {
        chart.setOption({
          graphic: [{ type: 'text', left: 'center', top: 'middle', style: { text: 'Not enough data for rolling return (need 3+ months).', fill: '#94a3b8', fontSize: 12 } }]
        });
        return;
      }

      const colors = rolling.map(v => v == null ? 'transparent' : v >= 0 ? '#059669' : '#dc2626');
      chart.setOption({
        animation: false,
        grid: { top: 20, right: 20, bottom: 40, left: 50 },
        tooltip: { trigger: 'axis', formatter: p => `${p[0].axisValue}<br/>3M Return: <b>${p[0].value != null ? (p[0].value >= 0 ? '+' : '') + p[0].value + '%' : '—'}</b>` },
        xAxis: { type: 'category', data: months, axisLine: { lineStyle: { color: '#e2e8f0' } }, axisTick: { show: false }, axisLabel: { color: '#94a3b8', fontSize: 10, interval: Math.ceil(months.length / 6) } },
        yAxis: { type: 'value', axisLabel: { color: '#94a3b8', fontSize: 10, formatter: '{value}%' }, splitLine: { lineStyle: { type: 'dashed', color: '#f1f5f9' } } },
        series: [{
          type: 'bar',
          data: rolling.map((v, i) => ({ value: v, itemStyle: { color: colors[i] } })),
          barMaxWidth: 20
        }]
      });
      new ResizeObserver(() => chart.resize()).observe(el);
    }

    function initRiskChart(months, ddSeries) {
      const el = document.getElementById('drawdownChartEl');
      if (!el) return;
      if (window._ddChart) { try { window._ddChart.dispose(); } catch(e) {} }
      const chart = echarts.init(el);
      window._ddChart = chart;

      if (!months || months.length === 0) {
        chart.setOption({
          graphic: [{ type: 'text', left: 'center', top: 'middle', style: { text: 'No drawdown data available.', fill: '#94a3b8', fontSize: 12 } }]
        });
        return;
      }

      chart.setOption({
        animation: false,
        grid: { top: 10, right: 10, bottom: 30, left: 50 },
        tooltip: { trigger: 'axis', formatter: p => `${p[0].axisValue}<br/>Drawdown: <b>${p[0].value}%</b>` },
        xAxis: { type: 'category', data: months, axisLine: { lineStyle: { color: '#e2e8f0' } }, axisTick: { show: false }, axisLabel: { show: true, interval: Math.ceil(months.length/6), color: '#94a3b8', fontSize: 10 } },
        yAxis: { type: 'value', max: 0, axisLabel: { color: '#94a3b8', fontSize: 10, formatter: '{value}%' }, splitLine: { lineStyle: { type: 'dashed', color: '#f1f5f9' } } },
        series: [{
          type: 'line', data: ddSeries, symbol: 'none', smooth: true,
          lineStyle: { color: '#dc2626', width: 2 },
          areaStyle: { color: 'rgba(220,38,38,0.1)' }
        }]
      });
      new ResizeObserver(() => chart.resize()).observe(el);
    }

    function initAllocChart() {
      const el = document.getElementById('allocChartEl');
      if (!el || !currentInvestor) return;
      if (window._allocChart) { try { window._allocChart.dispose(); } catch(e) {} }
      const chart = echarts.init(el);
      window._allocChart = chart;
      const sh = currentInvestor.strategyHoldings || [];
      chart.setOption({
        animation: false,
        series: [{
          type: 'pie',
          radius: ['50%', '80%'],
          avoidLabelOverlap: false,
          label: { show: false },
          data: sh.map(h => ({ value: parseFloat(h.weight) || 0, name: h.name || h.ticker, itemStyle: { color: h.color } })),
          itemStyle: { borderWidth: 2, borderColor: '#fff' }
        }]
      });
      new ResizeObserver(() => chart.resize()).observe(el);
    }

    /* ─────────────────────────────────────────────────────── */
    /* STRATEGY FILTER DROPDOWN                                */
    /* ─────────────────────────────────────────────────────── */
    function populateStrategyFilter() {
      const sel = document.getElementById('strategyFilter');
      /* Only list strategies that are actually used by loaded investors */
      const strats = [...new Set(allInvestors.map(i => i.strategy))].filter(s => s && s !== '—').sort();
      sel.innerHTML = '<option value="">All Strategies</option>';
      strats.forEach(name => {
        const opt = document.createElement('option');
        opt.value = name;
        opt.textContent = name;
        sel.appendChild(opt);
      });
    }

    /* ─────────────────────────────────────────────────────── */
    /* INIT                                                    */
    /* ─────────────────────────────────────────────────────── */
    window.addEventListener('DOMContentLoaded', async () => {
      const { data } = await supabaseClient.auth.getSession();
      if (!data.session) { window.location.href = '/signin.html'; return; }
      const email = data.session.user?.email || '';
      document.getElementById('sidebarUserEmail').textContent = email;
      document.getElementById('sidebarAvatarInitials').textContent = email.charAt(0).toUpperCase();

      const urlParams = new URLSearchParams(window.location.search);
      const embedMode = urlParams.get('embed') === '1';
      const embedUserId = urlParams.get('userId') || null;

      /* ── Embed mode: hide chrome, show only the detail panel ── */
      if (embedMode) {
        document.querySelector('aside')?.style.setProperty('display', 'none', 'important');
        document.querySelector('.top-nav')?.style.setProperty('display', 'none', 'important');
        document.getElementById('kpiBar')?.style.setProperty('display', 'none', 'important');
        /* Hide left panel (investor list) and expand detail panel to full width */
        const grid = document.querySelector('[style*="grid-template-columns:300px"]');
        if (grid) {
          grid.style.gridTemplateColumns = '1fr';
          grid.querySelectorAll(':scope > div:first-child').forEach(el => el.style.display = 'none');
        }
        document.querySelector('.main-content')?.style.setProperty('padding', '0', 'important');
        document.querySelector('.main-content')?.style.setProperty('margin-left', '0', 'important');
        document.querySelector('body')?.style.setProperty('background', 'white', 'important');
      }

      allInvestors = await loadInvestors();
      renderKpiBar(allInvestors);
      populateStrategyFilter();
      renderInvestorList(allInvestors);
      renderDetail();

      /* ── Auto-select investor if userId is in URL ── */
      if (embedUserId) {
        await selectInvestor(embedUserId);
      }

      document.getElementById('investorSearch').oninput  = () => renderInvestorList(allInvestors);
      document.getElementById('strategyFilter').onchange = () => renderInvestorList(allInvestors);
      document.getElementById('signOutBtn').onclick = async () => {
        await supabaseClient.auth.signOut();
        window.location.href = '/signin.html';
      };

      /* ── Live data refresh ────────────────────────────────── */
      let _refreshTimer = null;
      async function refreshAllData() {
        const prevId = currentInvestor?.userId;
        allInvestors = await loadInvestors();
        renderKpiBar(allInvestors);
        renderInvestorList(allInvestors);
        /* If a detail panel was open, re-load it with fresh data (silent = no spinner) */
        if (prevId) await selectInvestor(prevId, { silent: true });
      }

      /* Debounce rapid bursts (e.g. batch inserts) into one refresh */
      function scheduleRefresh() {
        clearTimeout(_refreshTimer);
        _refreshTimer = setTimeout(refreshAllData, 800);
      }

      /* Subscribe to the three tables that drive all investor data */
      supabaseClient
        .channel('investors-live')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'stock_holdings_c' },      scheduleRefresh)
        .on('postgres_changes', { event: '*', schema: 'public', table: 'transactions' },         scheduleRefresh)
        .on('postgres_changes', { event: '*', schema: 'public', table: 'strategy_analytics' },  scheduleRefresh)
        .on('postgres_changes', { event: '*', schema: 'public', table: 'profiles' },             scheduleRefresh)
        .subscribe();

      /* Fallback: silent background poll every 60 s (catches anything Realtime misses) */
      setInterval(refreshAllData, 60000);
    });
  </script>

  </div>

</div>
<script>
(function(){
  var link=document.getElementById("teamNavLink");
  if(!link)return;
  var key=Object.keys(localStorage).find(function(k){return k.startsWith("sb-")&&k.endsWith("-auth-token");});
  if(!key)return;
  try{
    var token=JSON.parse(localStorage.getItem(key))&&JSON.parse(localStorage.getItem(key)).access_token;
    if(!token)return;
    fetch("/api/team/me",{headers:{Authorization:"Bearer "+token}})
      .then(function(r){return r.json();})
      .then(function(d){if(d.role==="admin")link.style.display="";})
      .catch(function(){});
  }catch(e){}
})();
</script>
