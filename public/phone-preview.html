<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Client Preview — Mint Admin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: radial-gradient(ellipse at 30% 0%, #2d1b69 0%, #1a0d3e 40%, #0d0d14 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ── Top bar ── */
    .top-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 52px;
      background: rgba(13, 10, 30, 0.75);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 20px;
      z-index: 200;
    }

    .top-bar-logo {
      width: 28px; height: 28px;
      border-radius: 8px;
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 800; color: #fff;
      flex-shrink: 0;
    }

    .top-bar-label {
      font-size: 13px; font-weight: 700; color: rgba(255,255,255,0.9);
      letter-spacing: -0.01em;
    }

    .top-bar-name {
      font-size: 12px; color: rgba(255,255,255,0.45); font-weight: 500;
    }

    .top-bar-sep { width: 1px; height: 20px; background: rgba(255,255,255,0.12); flex-shrink: 0; }
    .top-bar-spacer { flex: 1; }

    .env-badge {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 11px; font-weight: 700;
      padding: 4px 10px; border-radius: 20px;
    }
    .env-badge.dev  { background: rgba(109,40,217,0.25); color: #c4b5fd; border: 1px solid rgba(167,139,250,0.25); }
    .env-badge.live { background: rgba(21,128,61,0.25);  color: #86efac; border: 1px solid rgba(134,239,172,0.2); }

    /* ── View mode toggle ── */
    .view-toggle {
      display: inline-flex;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      overflow: hidden;
      background: rgba(255,255,255,0.05);
    }
    .view-toggle button {
      border: none;
      background: none;
      color: rgba(255,255,255,0.45);
      font-size: 12px; font-weight: 700;
      padding: 5px 13px;
      cursor: pointer;
      display: flex; align-items: center; gap: 6px;
      transition: all 0.15s;
    }
    .view-toggle button + button {
      border-left: 1px solid rgba(255,255,255,0.1);
    }
    .view-toggle button.active {
      background: rgba(124,58,237,0.4);
      color: #c4b5fd;
    }
    .view-toggle button:hover:not(.active) {
      background: rgba(255,255,255,0.07);
      color: rgba(255,255,255,0.7);
    }

    .frame-toggle {
      display: inline-flex; align-items: center; gap: 7px;
      font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.55);
      cursor: pointer; user-select: none;
    }
    .frame-toggle input[type="checkbox"] {
      width: 14px; height: 14px; accent-color: #7c3aed; cursor: pointer;
    }

    .close-btn {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.6); font-size: 12px; font-weight: 600;
      padding: 5px 12px; border-radius: 8px; cursor: pointer;
      transition: all 0.15s; text-decoration: none;
    }
    .close-btn:hover { background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.9); }

    /* ══════════════════════════════════════
       PHONE MODE
    ══════════════════════════════════════ */
    #phoneStage {
      padding-top: 72px;
      padding-bottom: 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      min-height: 100vh;
      justify-content: center;
      width: 100%;
    }

    .phone-wrap { position: relative; }

    .phone-shell {
      width: 375px;
      background: #111;
      border-radius: 52px;
      padding: 14px;
      box-shadow:
        0 0 0 1px #2c2c2e,
        0 32px 80px rgba(0,0,0,0.7),
        0 0 0 8px #1a1a1c,
        0 0 0 9px #2c2c2e;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .phone-shell.frame-off {
      background: transparent;
      border-radius: 20px;
      padding: 0;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.08);
    }

    .phone-screen {
      background: #000;
      border-radius: 38px;
      height: 720px;
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
    }

    .phone-shell.frame-off .phone-screen {
      border-radius: 14px;
    }

    .phone-notch {
      position: absolute;
      top: 0; left: 50%; transform: translateX(-50%);
      width: 120px; height: 34px;
      background: #111;
      border-radius: 0 0 22px 22px;
      z-index: 10;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .phone-shell.frame-off .phone-notch { display: none; }

    .notch-cam { width: 10px; height: 10px; border-radius: 50%; background: #1c1c1e; border: 2px solid #2c2c2e; }
    .notch-speaker { width: 56px; height: 5px; border-radius: 3px; background: #1c1c1e; }

    .phone-btn-left, .phone-btn-right {
      position: absolute; background: #222; border-radius: 3px;
    }
    .phone-btn-left  { left: -14px; width: 4px; }
    .phone-btn-left.vol-up   { top: 120px; height: 36px; }
    .phone-btn-left.vol-down { top: 172px; height: 36px; }
    .phone-btn-left.silent   { top:  80px; height: 26px; }
    .phone-btn-right { right: -14px; width: 4px; top: 140px; height: 60px; }

    .phone-shell.frame-off .phone-btn-left,
    .phone-shell.frame-off .phone-btn-right { display: none; }

    .phone-home {
      position: absolute;
      bottom: 8px; left: 50%; transform: translateX(-50%);
      width: 130px; height: 5px;
      background: rgba(255,255,255,0.35);
      border-radius: 3px; z-index: 10;
    }
    .phone-shell.frame-off .phone-home { display: none; }

    .phone-iframe-wrap { flex: 1; position: relative; overflow: hidden; }

    /* ══════════════════════════════════════
       DESKTOP MODE
    ══════════════════════════════════════ */
    #desktopStage {
      display: none;
      position: fixed;
      inset: 52px 0 0 0;
      flex-direction: column;
      background: #0d0d14;
    }

    /* browser chrome bar */
    .browser-chrome {
      height: 44px;
      background: #1a1a2e;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 16px;
      flex-shrink: 0;
    }

    .browser-dots {
      display: flex; gap: 6px; flex-shrink: 0;
    }
    .browser-dot {
      width: 12px; height: 12px; border-radius: 50%;
    }
    .browser-dot.red    { background: #ff5f57; }
    .browser-dot.yellow { background: #febc2e; }
    .browser-dot.green  { background: #28c840; }

    .browser-url-bar {
      flex: 1;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      height: 28px;
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 6px;
      min-width: 0;
    }
    .browser-url-bar svg { flex-shrink: 0; opacity: 0.4; }
    .browser-url-text {
      font-size: 12px; color: rgba(255,255,255,0.5);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .browser-url-bar .lock-icon { color: #86efac; opacity: 0.8; font-size: 11px; }

    .desktop-iframe-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    /* ── Shared iframe styles ── */
    .preview-iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* Loading overlay */
    .loading-overlay {
      position: absolute; inset: 0;
      background: #f8f6fa;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 14px; z-index: 5;
      transition: opacity 0.4s ease;
    }
    .loading-overlay.hidden { opacity: 0; pointer-events: none; }

    .spinner {
      width: 34px; height: 34px;
      border: 3px solid #e5e5ea;
      border-top-color: #7c3aed;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    .loading-text { font-size: 13px; font-weight: 600; color: #8e8e93; }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-screen {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 10px; padding: 24px; background: #f8f6fa;
    }
    .error-icon { font-size: 36px; }
    .error-title { font-size: 15px; font-weight: 700; color: #1c1c1e; text-align: center; }
    .error-msg { font-size: 12px; color: #8e8e93; text-align: center; line-height: 1.5; }

    .hint-text {
      font-size: 11px; color: rgba(255,255,255,0.22); text-align: center; line-height: 1.5;
    }
  </style>
</head>
<body>

  <!-- Top bar -->
  <div class="top-bar">
    <div class="top-bar-logo">M</div>
    <div>
      <div class="top-bar-label">Client Preview</div>
    </div>
    <div class="top-bar-sep"></div>
    <span class="top-bar-name" id="clientNameLabel">Loading…</span>
    <span class="env-badge" id="envBadge">—</span>
    <div class="top-bar-spacer"></div>

    <!-- View mode toggle -->
    <div class="view-toggle" id="viewToggle">
      <button data-mode="phone" class="active">
        <svg viewBox="0 0 24 24" width="13" height="13" fill="currentColor"><path d="M17 1.01L7 1c-1.1 0-2 .9-2 2v18c0 1.1.9 2 2 2h10c1.1 0 2-.9 2-2V3c0-1.1-.9-1.99-2-1.99zM17 19H7V5h10v14z"/></svg>
        Phone
      </button>
      <button data-mode="desktop">
        <svg viewBox="0 0 24 24" width="13" height="13" fill="currentColor"><path d="M20 3H4c-1.1 0-2 .9-2 2v11c0 1.1.9 2 2 2h3l-1 1v2h12v-2l-1-1h3c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 13H4V5h16v11z"/></svg>
        Desktop
      </button>
    </div>

    <div class="top-bar-sep" id="frameSep"></div>
    <label class="frame-toggle" id="frameToggleWrap">
      <input type="checkbox" id="frameToggle" checked>
      Phone frame
    </label>

    <div class="top-bar-sep"></div>
    <a href="javascript:window.close()" class="close-btn">
      <svg viewBox="0 0 24 24" width="12" height="12" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
      Close
    </a>
  </div>

  <!-- ── PHONE STAGE ── -->
  <div id="phoneStage">
    <div class="phone-wrap">
      <div class="phone-shell" id="phoneShell">
        <div class="phone-btn-left silent"></div>
        <div class="phone-btn-left vol-up"></div>
        <div class="phone-btn-left vol-down"></div>
        <div class="phone-btn-right"></div>

        <div class="phone-screen" id="phoneScreen">
          <div class="phone-notch">
            <div class="notch-speaker"></div>
            <div class="notch-cam"></div>
          </div>

          <div class="phone-iframe-wrap">
            <div class="loading-overlay" id="phoneLoading">
              <div class="spinner"></div>
              <div class="loading-text">Opening Mint…</div>
            </div>
            <iframe id="phoneFrame" class="preview-iframe" allow="fullscreen" referrerpolicy="no-referrer-when-downgrade"></iframe>
          </div>

          <div class="phone-home"></div>
        </div>
      </div>
    </div>

    <div class="hint-text">
      The client app URL is unchanged — only this wrapper is added by Mint Admin.
    </div>
  </div>

  <!-- ── DESKTOP STAGE ── -->
  <div id="desktopStage">
    <!-- Fake browser chrome -->
    <div class="browser-chrome">
      <div class="browser-dots">
        <div class="browser-dot red"></div>
        <div class="browser-dot yellow"></div>
        <div class="browser-dot green"></div>
      </div>
      <div class="browser-url-bar">
        <span class="lock-icon">🔒</span>
        <svg viewBox="0 0 24 24" width="13" height="13" fill="rgba(255,255,255,0.4)"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
        <span class="browser-url-text" id="desktopUrlText">—</span>
      </div>
    </div>

    <div class="desktop-iframe-wrap">
      <div class="loading-overlay" id="desktopLoading">
        <div class="spinner"></div>
        <div class="loading-text">Opening Mint…</div>
      </div>
      <iframe id="desktopFrame" class="preview-iframe" allow="fullscreen" referrerpolicy="no-referrer-when-downgrade"></iframe>
    </div>
  </div>

  <script>
    const params     = new URLSearchParams(window.location.search);
    const targetUrl  = params.get('url')  || '';
    const clientName = params.get('name') || 'Client';
    const envParam   = params.get('env')  || 'dev';

    // Labels
    document.getElementById('clientNameLabel').textContent = clientName;
    const badge = document.getElementById('envBadge');
    if (envParam === 'live') {
      badge.textContent = '🟢 Live';
      badge.className = 'env-badge live';
    } else {
      badge.textContent = '🔵 Dev';
      badge.className = 'env-badge dev';
    }
    document.title = `${clientName} — Client Preview`;

    // Show a friendly URL in the desktop bar (strip auth tokens from display)
    let displayUrl = targetUrl;
    try {
      const u = new URL(targetUrl);
      displayUrl = u.origin + u.pathname;
    } catch {}
    document.getElementById('desktopUrlText').textContent = displayUrl || targetUrl;

    // ── Load iframes ──
    const phoneFrame   = document.getElementById('phoneFrame');
    const desktopFrame = document.getElementById('desktopFrame');
    const phoneLoading   = document.getElementById('phoneLoading');
    const desktopLoading = document.getElementById('desktopLoading');

    function hideOverlay(overlay) { overlay.classList.add('hidden'); }

    if (!targetUrl) {
      ['phoneFrame', 'desktopFrame'].forEach(id => {
        const wrap = document.getElementById(id).parentElement;
        wrap.innerHTML = `
          <div class="error-screen">
            <div class="error-icon">⚠️</div>
            <div class="error-title">No URL provided</div>
            <div class="error-msg">This page must be opened from the Client View Studio.</div>
          </div>`;
      });
    } else {
      // Load phone iframe immediately
      phoneFrame.src = targetUrl;
      phoneFrame.addEventListener('load', () => hideOverlay(phoneLoading));
      setTimeout(() => hideOverlay(phoneLoading), 6000);

      // Desktop iframe is loaded lazily when mode switches to desktop
    }

    // ── View mode toggle ──
    let currentMode = 'phone';
    let desktopLoaded = false;

    const phoneStage   = document.getElementById('phoneStage');
    const desktopStage = document.getElementById('desktopStage');
    const frameToggleWrap = document.getElementById('frameToggleWrap');
    const frameSep = document.getElementById('frameSep');

    document.getElementById('viewToggle').addEventListener('click', e => {
      const btn = e.target.closest('button[data-mode]');
      if (!btn || btn.dataset.mode === currentMode) return;

      currentMode = btn.dataset.mode;
      document.querySelectorAll('#viewToggle button').forEach(b => b.classList.toggle('active', b === btn));

      if (currentMode === 'desktop') {
        phoneStage.style.display = 'none';
        desktopStage.style.display = 'flex';
        frameToggleWrap.style.display = 'none';
        frameSep.style.display = 'none';

        // Lazy-load desktop iframe on first switch
        if (!desktopLoaded && targetUrl) {
          desktopLoaded = true;
          desktopFrame.src = targetUrl;
          desktopFrame.addEventListener('load', () => hideOverlay(desktopLoading));
          setTimeout(() => hideOverlay(desktopLoading), 8000);
        }
      } else {
        phoneStage.style.display = 'flex';
        desktopStage.style.display = 'none';
        frameToggleWrap.style.display = 'inline-flex';
        frameSep.style.display = 'block';
      }
    });

    // ── Phone frame toggle ──
    const phoneShell = document.getElementById('phoneShell');
    document.getElementById('frameToggle').addEventListener('change', e => {
      phoneShell.classList.toggle('frame-off', !e.target.checked);
    });
  </script>
</body>
</html>
