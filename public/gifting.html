<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gifting · Mint admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-page: #F5F4F9;
      --bg-card: #FFFFFF;
      --bg-hover: #F9F8FC;
      --border: #E8E6F0;
      --border-light: #F0EEF8;
      --text-primary: #1A1825;
      --text-secondary: #6B6880;
      --text-tertiary: #A09DB5;
      --purple: #6C5CE7;  --purple-bg: #EEEDFE;  --purple-text: #534AB7;
      --green: #0F6E56;   --green-bg: #E1F5EE;   --green-mid: #1D9E75;
      --blue: #185FA5;    --blue-bg: #E6F1FB;    --blue-mid: #378ADD;
      --amber: #854F0B;   --amber-bg: #FAEEDA;   --amber-mid: #EF9F27;
      --slate: #475569;   --slate-bg: #EEF1F5;   --slate-mid: #94A3B8;
      --teal: #1D9E75;    --teal-bg: #E1F5EE;
      --radius-md: 8px; --radius-lg: 12px; --radius-xl: 16px; --radius-pill: 100px;
      --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    body { font-family: var(--font); background: var(--bg-page); color: var(--text-primary); min-height: 100vh; -webkit-font-smoothing: antialiased; }
    .main-content { margin-left: 220px; min-height: 100vh; padding: 2.5rem 2rem; }
    .page { max-width: 1100px; margin: 0 auto; }

    /* Header */
    .header { margin-bottom: 1.75rem; }
    .header h1 { font-size: 18px; font-weight: 600; color: var(--text-primary); display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
    .header h1 svg { color: var(--purple); }
    .header p { font-size: 13px; color: var(--text-secondary); line-height: 1.5; }

    /* Stat cards */
    .stats { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 10px; margin-bottom: 1.75rem; }
    .stat { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1rem 1.1rem; }
    .stat-label { font-size: 10.5px; font-weight: 500; letter-spacing: 0.07em; text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 10px; display: flex; align-items: center; gap: 5px; }
    .stat-label svg { width: 14px; height: 14px; flex-shrink: 0; }
    .stat-value { font-size: 24px; font-weight: 600; }
    .v-purple { color: var(--purple); } .v-green { color: var(--green); } .v-teal { color: var(--teal); }
    .v-blue { color: var(--blue); } .v-amber { color: var(--amber); }

    /* Table card */
    .table-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-xl); overflow: hidden; }
    .table-top { display: flex; align-items: center; justify-content: space-between; padding: 1rem 1.25rem; border-bottom: 1px solid var(--border-light); gap: 12px; flex-wrap: wrap; }
    .table-title { font-size: 14px; font-weight: 600; color: var(--text-primary); display: flex; align-items: center; gap: 8px; }
    .count-pill { background: var(--bg-page); color: var(--text-secondary); font-size: 11.5px; font-weight: 500; border-radius: var(--radius-pill); padding: 2px 9px; border: 1px solid var(--border); }
    .search-box { display: flex; align-items: center; gap: 7px; background: var(--bg-page); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 7px 11px; }
    .search-box svg { color: var(--text-tertiary); width: 14px; height: 14px; flex-shrink: 0; }
    .search-box input { background: none; border: none; outline: none; font-family: var(--font); font-size: 12.5px; color: var(--text-primary); width: 220px; }
    .search-box input::placeholder { color: var(--text-tertiary); }

    .table-scroll { max-height: 64vh; overflow: auto; }
    table { width: 100%; border-collapse: collapse; }
    thead th { font-size: 10.5px; font-weight: 500; letter-spacing: 0.07em; text-transform: uppercase; color: var(--text-tertiary); padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border-light); white-space: nowrap; background: var(--bg-card); position: sticky; top: 0; z-index: 1; }
    thead th:first-child { padding-left: 1.25rem; } thead th:last-child { padding-right: 1.25rem; }
    thead th.r, tbody td.r { text-align: right; }
    tbody tr { border-bottom: 1px solid var(--border-light); transition: background 0.12s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--bg-hover); }
    tbody td { padding: 13px 12px; font-size: 13px; color: var(--text-secondary); vertical-align: middle; white-space: nowrap; }
    tbody td:first-child { padding-left: 1.25rem; } tbody td:last-child { padding-right: 1.25rem; }
    .date-cell { font-size: 12px; color: var(--text-tertiary); }

    .sender-cell { display: flex; align-items: center; gap: 9px; }
    .avatar { width: 30px; height: 30px; border-radius: 50%; background: var(--purple); color: #fff; font-size: 10px; font-weight: 600; display: flex; align-items: center; justify-content: center; flex-shrink: 0; letter-spacing: 0.02em; }
    .sender-name { font-size: 13px; color: var(--text-primary); font-weight: 500; }
    .recip-cell { display: flex; align-items: center; gap: 5px; color: var(--text-secondary); }
    .recip-cell svg { width: 12px; height: 12px; color: var(--text-tertiary); flex-shrink: 0; }
    .gift-cell { display: flex; align-items: center; gap: 7px; }
    .gift-name { font-size: 13px; color: var(--text-primary); }
    .tag { font-size: 10px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; padding: 2px 7px; border-radius: var(--radius-pill); }
    .tag-strategy { background: var(--purple-bg); color: var(--purple-text); }
    .amount { font-size: 13px; color: var(--text-primary); font-weight: 500; }

    .badge { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 500; padding: 3px 9px; border-radius: var(--radius-pill); }
    .badge::before { content: ''; width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
    .badge-claimed   { background: var(--green-bg);  color: var(--green);  } .badge-claimed::before   { background: var(--green-mid); }
    .badge-refunded  { background: var(--blue-bg);   color: var(--blue);   } .badge-refunded::before  { background: var(--blue-mid); }
    .badge-expired   { background: var(--amber-bg);  color: var(--amber);  } .badge-expired::before   { background: var(--amber-mid); }
    .badge-pending   { background: var(--purple-bg); color: var(--purple-text); } .badge-pending::before { background: var(--purple); }
    .badge-cancelled { background: var(--slate-bg);  color: var(--slate);  } .badge-cancelled::before { background: var(--slate-mid); }

    .muted { color: var(--text-tertiary); }
    .empty-state { padding: 56px 0; text-align: center; color: var(--text-tertiary); font-size: 13px; }

    @media (max-width: 1200px) { .stats { grid-template-columns: repeat(3, minmax(0, 1fr)); } }
    @media (max-width: 760px) { .main-content { margin-left: 0; padding: 1.5rem 1rem; } .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); } .table-top { flex-direction: column; align-items: flex-start; } }
  </style>
  <script src="/js/cc-badge.js" defer></script>
</head>
<body>
  <aside class="sidebar"></aside>
  <script src="/js/sidebar.js"></script>

  <main class="main-content">
    <div class="page">

      <div class="header">
        <h1>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polyline points="20 12 20 22 4 22 4 12"></polyline><rect x="2" y="7" width="20" height="5"></rect>
            <line x1="12" y1="22" x2="12" y2="7"></line>
            <path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"></path><path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"></path>
          </svg>
          Gifting
        </h1>
        <p>Every investment gift sent — who sent it, to whom, what they gifted, and where it stands.</p>
      </div>

      <div class="stats">
        <div class="stat">
          <div class="stat-label"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 12 20 22 4 22 4 12"></polyline><rect x="2" y="7" width="20" height="5"></rect><line x1="12" y1="22" x2="12" y2="7"></line><path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"></path><path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"></path></svg>Total gifts</div>
          <div class="stat-value v-purple" id="statTotal">—</div>
        </div>
        <div class="stat">
          <div class="stat-label"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M16 8h-6a2 2 0 1 0 0 4h4a2 2 0 1 1 0 4H8"></path><line x1="12" y1="6" x2="12" y2="8"></line><line x1="12" y1="16" x2="12" y2="18"></line></svg>Total value</div>
          <div class="stat-value v-green" id="statValue" style="font-size:19px;">—</div>
        </div>
        <div class="stat">
          <div class="stat-label"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>Claimed</div>
          <div class="stat-value v-teal" id="statClaimed">—</div>
        </div>
        <div class="stat">
          <div class="stat-label"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>Pending</div>
          <div class="stat-value v-blue" id="statPending">—</div>
        </div>
        <div class="stat">
          <div class="stat-label"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 .49-4.95"></path></svg>Expired / refunded</div>
          <div class="stat-value v-amber" id="statExpired">—</div>
        </div>
      </div>

      <div class="table-card">
        <div class="table-top">
          <div class="table-title">All gifts <span class="count-pill" id="giftCount">—</span></div>
          <div class="search-box">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            <input id="giftSearch" type="text" placeholder="Search sender, recipient, asset…" aria-label="Search gifts" />
          </div>
        </div>
        <div class="table-scroll">
          <table>
            <thead>
              <tr>
                <th>Sent</th><th>Sender</th><th>Recipient</th><th>Gift</th>
                <th class="r">Amount</th><th>Status</th><th>Last update</th>
              </tr>
            </thead>
            <tbody id="giftRows">
              <tr><td colspan="7" class="empty-state">Loading gifts…</td></tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </main>

  <div id="mintAppOverlay" style="display:none;position:fixed;inset:0;z-index:99998;background:#0f172a;">
    <div style="position:absolute;top:0;left:0;right:0;height:44px;background:#0f172a;display:flex;align-items:center;justify-content:space-between;padding:0 16px;z-index:1;">
      <div style="display:flex;align-items:center;gap:8px;">
        <img src="/icon.png" style="width:22px;height:22px;border-radius:6px;" />
        <span style="color:white;font-size:13px;font-weight:600;">Mint App</span>
      </div>
      <button onclick="mintAppClose()" style="background:#1e293b;color:#94a3b8;border:none;border-radius:8px;padding:5px 14px;cursor:pointer;font-size:12px;font-weight:500;">&#8592; Back to Admin</button>
    </div>
    <iframe id="mintAppFrame" src="" style="position:absolute;top:44px;left:0;right:0;bottom:0;width:100%;height:calc(100% - 44px);border:none;background:white;" allowfullscreen></iframe>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://mfxnghmuccevsxwcetej.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1meG5naG11Y2NldnN4d2NldGVqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg4NTI1ODAsImV4cCI6MjA4NDQyODU4MH0.lktfglzBMaHd79hLFDRH1HHSwsEwZ56Tv6e287kQiFg';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const esc = (s) => String(s == null ? '' : s).replace(/[&<>"']/g, (c) => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
    const rand = (cents) => 'R ' + (Number(cents || 0) / 100).toLocaleString('en-ZA', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    const dt = (iso) => {
      if (!iso) return '<span class="muted">—</span>';
      try { return new Date(iso).toLocaleString('en-ZA', { timeZone: 'Africa/Johannesburg', dateStyle: 'medium', timeStyle: 'short' }); }
      catch { return esc(iso); }
    };
    const initials = (name) => {
      const parts = String(name || '').trim().split(/\s+/).filter(Boolean);
      if (!parts.length) return '?';
      return ((parts[0][0] || '') + (parts.length > 1 ? parts[parts.length - 1][0] : '')).toUpperCase();
    };
    const RECIP_ARROW = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>';

    // Derive a display status from the row's flags (refunded/cancelled override).
    const statusOf = (g) => {
      if (g.cancelled_at || g.status === 'cancelled') return { key: 'cancelled', label: 'Cancelled', at: g.cancelled_at };
      if (g.status === 'claimed' || g.claimed_at)     return { key: 'claimed',   label: 'Claimed',   at: g.claimed_at };
      if (g.refunded_at)                              return { key: 'refunded',  label: 'Refunded',  at: g.refunded_at };
      const expired = g.status === 'expired' || (g.expires_at && new Date(g.expires_at).getTime() < Date.now());
      if (expired)                                    return { key: 'expired',   label: 'Expired',   at: g.expires_at };
      return { key: 'pending', label: 'Pending', at: g.expires_at };
    };

    let allGifts = [];

    const plainName = (profile, fallback) => {
      if (profile) {
        const n = [profile.first_name, profile.last_name].filter(Boolean).join(' ').trim();
        if (n) return n;
        if (profile.email) return profile.email;
      }
      return fallback || '';
    };

    const renderStats = (gifts) => {
      let claimed = 0, pending = 0, expired = 0, value = 0;
      gifts.forEach((g) => {
        value += Number(g.amount || 0);
        const s = statusOf(g).key;
        if (s === 'claimed') claimed++;
        else if (s === 'pending') pending++;
        else if (s === 'expired' || s === 'refunded') expired++;
      });
      document.getElementById('statTotal').textContent = gifts.length;
      document.getElementById('statValue').textContent = rand(value);
      document.getElementById('statClaimed').textContent = claimed;
      document.getElementById('statPending').textContent = pending;
      document.getElementById('statExpired').textContent = expired;
    };

    const renderRows = (gifts) => {
      const tbody = document.getElementById('giftRows');
      document.getElementById('giftCount').textContent = gifts.length;
      if (!gifts.length) {
        tbody.innerHTML = '<tr><td colspan="7" class="empty-state">No gifts found.</td></tr>';
        return;
      }
      tbody.innerHTML = gifts.map((g) => {
        const s = statusOf(g);
        const assetTag = g.asset_type ? `<span class="tag tag-strategy">${esc(String(g.asset_type))}</span>` : '';
        const recipient = g._recipientName
          ? esc(g._recipientName)
          : (g.recipient_identifier ? esc(g.recipient_identifier) : '<span class="muted">Unclaimed</span>');
        return `<tr>
          <td class="date-cell">${dt(g.created_at)}</td>
          <td>
            <div class="sender-cell">
              <div class="avatar" aria-hidden="true">${esc(initials(g._senderName))}</div>
              <span class="sender-name">${esc(g._senderName || 'Unknown')}</span>
            </div>
          </td>
          <td><div class="recip-cell">${RECIP_ARROW}${recipient}</div></td>
          <td><div class="gift-cell"><span class="gift-name">${esc(g.asset_name || '—')}</span>${assetTag}</div></td>
          <td class="r amount">${rand(g.amount)}</td>
          <td><span class="badge badge-${s.key}">${esc(s.label)}</span></td>
          <td class="date-cell">${dt(s.at)}</td>
        </tr>`;
      }).join('');
    };

    const applyFilter = () => {
      const q = (document.getElementById('giftSearch').value || '').trim().toLowerCase();
      if (!q) { renderRows(allGifts); return; }
      const filtered = allGifts.filter((g) =>
        [g._senderName, g._recipientName, g.recipient_identifier, g.asset_name, statusOf(g).label]
          .some((v) => String(v || '').toLowerCase().includes(q)));
      renderRows(filtered);
    };

    const load = async () => {
      try {
        const { data: gifts, error } = await supabaseClient
          .from('gift_claims')
          .select('id, sender_user_id, recipient_user_id, recipient_identifier, amount, asset_type, asset_name, status, expires_at, reserved_at, refunded_at, created_at, claimed_at, cancelled_at')
          .order('created_at', { ascending: false })
          .limit(2000);
        if (error) throw error;

        const ids = [...new Set((gifts || []).flatMap((g) => [g.sender_user_id, g.recipient_user_id]).filter(Boolean))];
        const profMap = {};
        if (ids.length) {
          const { data: profs } = await supabaseClient
            .from('profiles').select('id, first_name, last_name, email').in('id', ids);
          (profs || []).forEach((p) => { profMap[String(p.id)] = p; });
        }

        allGifts = (gifts || []).map((g) => ({
          ...g,
          _senderName: plainName(profMap[String(g.sender_user_id)], 'Unknown'),
          _recipientName: plainName(profMap[String(g.recipient_user_id)], ''),
        }));

        renderStats(allGifts);
        renderRows(allGifts);
      } catch (err) {
        console.error('Gifting load error:', err);
        document.getElementById('giftRows').innerHTML =
          '<tr><td colspan="7" class="empty-state">Could not load gifts: ' + esc(err.message || 'unknown error') + '</td></tr>';
      }
    };

    document.getElementById('giftSearch').addEventListener('input', applyFilter);

    (async () => {
      const { data } = await supabaseClient.auth.getSession();
      if (!data.session) { window.location.href = '/signin.html'; return; }
      load();
    })();
  </script>

  <script>
  (function(){
    var link=document.getElementById("teamNavLink");
    if(!link)return;
    var key=Object.keys(localStorage).find(function(k){return k.startsWith("sb-")&&k.endsWith("-auth-token");});
    if(!key)return;
    try{
      var token=JSON.parse(localStorage.getItem(key))&&JSON.parse(localStorage.getItem(key)).access_token;
      if(!token)return;
      fetch("/api/team?action=me",{headers:{Authorization:"Bearer "+token}})
        .then(function(r){return r.json();})
        .then(function(d){if(d.role==="admin")link.style.display="";})
        .catch(function(){});
    }catch(e){}
  })();
  </script>
  <script>window.PAGE_ACCESS_KEY = "gifting";</script>
  <script src="/js/access-guard.js"></script>
</body>
</html>
