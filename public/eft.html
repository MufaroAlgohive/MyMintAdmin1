  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://mfxnghmuccevsxwcetej.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1meG5naG11Y2NldnN4d2NldGVqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg4NTI1ODAsImV4cCI6MjA4NDQyODU4MH0.lktfglzBMaHd79hLFDRH1HHSwsEwZ56Tv6e287kQiFg';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const requireSession = async () => {
      const { data } = await supabaseClient.auth.getSession();
      if (!data.session) { window.location.href = '/signin.html'; return false; }
      return true;
    };

    const signOutBtn = document.getElementById('signOutBtn');
    if (signOutBtn) {
      signOutBtn.addEventListener('click', async () => {
        await supabaseClient.auth.signOut();
        window.location.href = '/signin.html';
      });
    }

    let currentUserEmail = '';
    let currentUserSession = null;

    (async () => {
      const { data: { session } } = await supabaseClient.auth.getSession();
      currentUserSession = session;
      const email = session?.user?.email || '';
      currentUserEmail = email;
      const nameEl = document.getElementById('sidebarUserEmail');
      const avatarEl = document.getElementById('sidebarAvatarInitials');
      if (nameEl && email) nameEl.textContent = email;
      if (avatarEl && email) avatarEl.textContent = email.charAt(0).toUpperCase();
    })();

    const formatCurrency = (value) => {
      if (value === null || value === undefined) return 'R 0.00';
      const numeric = Number(value);
      if (Number.isNaN(numeric)) return 'R 0.00';
      return new Intl.NumberFormat('en-ZA', { style: 'currency', currency: 'ZAR', minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(numeric);
    };

    /* ── Client Search ── */
    let allProfiles = [];
    const clientSearch = document.getElementById('clientSearch');
    const searchSuggestions = document.getElementById('searchSuggestions');
    const selectedClientId = document.getElementById('selectedClientId');
    const selectedClientInfo = document.getElementById('selectedClientInfo');
    const selectedClientName = document.getElementById('selectedClientName');

    clientSearch.addEventListener('input', async (e) => {
      const query = e.target.value.toLowerCase().trim();
      if (query.length === 0) {
        searchSuggestions.classList.remove('show');
        selectedClientId.value = '';
        selectedClientInfo.style.display = 'none';
        return;
      }

      if (allProfiles.length === 0) {
        const { data } = await supabaseClient.from('profiles').select('id, first_name, last_name, email, mint_number');
        allProfiles = data || [];
      }

      const filtered = allProfiles.filter(p => {
        const fullName = `${p.first_name || ''} ${p.last_name || ''}`.toLowerCase();
        const email = (p.email || '').toLowerCase();
        return fullName.includes(query) || email.includes(query) || (p.mint_number && p.mint_number.toLowerCase().includes(query));
      }).slice(0, 8);

      searchSuggestions.innerHTML = filtered.map(p => `
        <div class="search-suggestion-item" data-id="${p.id}" data-name="${p.first_name} ${p.last_name}">
          <div style="font-weight:600;color:#1e293b;">${p.first_name} ${p.last_name}</div>
          <div style="font-size:11px;color:#94a3b8;">${p.email || ''}</div>
        </div>
      `).join('');

      searchSuggestions.classList.add('show');
      document.querySelectorAll('.search-suggestion-item').forEach(item => {
        item.addEventListener('click', () => {
          const id = item.dataset.id;
          const name = item.dataset.name;
          selectedClientId.value = id;
          clientSearch.value = name;
          searchSuggestions.classList.remove('show');
          selectedClientName.textContent = name;
          document.getElementById('selectedClientType').value = 'parent';
          selectedClientInfo.style.display = 'block';

          // Show child selection options if this parent has children
          const childSelectionOptions = document.getElementById('childSelectionOptions');
          const childRadios = document.getElementById('childRadios');

          const parentChildren = childrenByParent && childrenByParent[id];
          if (parentChildren && parentChildren.length > 0) {
            childRadios.innerHTML = parentChildren
              .map(child => `
                <label style="display:block;margin-bottom:8px;cursor:pointer;padding:8px;border-radius:4px;border:1px solid #e2e8f0;" class="child-option" data-child-id="${child.id}" data-parent-id="${id}">
                  <input type="radio" name="childSelect" value="${child.id}" style="margin-right:6px;" />
                  <span style="color:#1e293b;font-size:12px;">${child.first_name} ${child.last_name}</span>
                  <span style="color:#94a3b8;font-size:11px;margin-left:4px;">(R ${((child.available_balance || 0) / 100).toLocaleString('en-ZA', {minimumFractionDigits: 2, maximumFractionDigits: 2})})</span>
                </label>
              `).join('');

            childSelectionOptions.style.display = 'block';

            // Add click handlers for child options
            document.querySelectorAll('.child-option').forEach(label => {
              label.addEventListener('click', (e) => {
                const childId = label.dataset.childId;
                const parentId = label.dataset.parentId;
                const childName = label.querySelector('span').textContent;

                selectedClientId.value = childId;
                document.getElementById('selectedClientType').value = 'child';
                selectedClientName.textContent = childName + ' (Child)';
              });
            });
          } else {
            childSelectionOptions.style.display = 'none';
          }
        });
      });
    });

    document.addEventListener('click', (e) => {
      if (!e.target.closest('.search-box-wrapper')) {
        searchSuggestions.classList.remove('show');
      }
    });

    let childrenByParent = {};

    /* ── Add to Wallet Form ── */
    const addWalletForm = document.getElementById('addWalletForm');
    const walletAmount = document.getElementById('walletAmount');
    const addWalletAlert = document.getElementById('addWalletAlert');
    const addWalletSuccess = document.getElementById('addWalletSuccess');

    addWalletForm.addEventListener('submit', async (e) => {
      e.preventDefault();

        addWalletAlert.style.display = 'block';
        return;

        addWalletAlert.textContent = 'Please enter a valid amount';
        addWalletAlert.style.display = 'block';
        return;

          headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${freshSession?.access_token}` },

        const result = await response.json();
        if (!response.ok) throw new Error(result.error || 'Failed to add to wallet');

        if (walletStatus === 'active') {
          addWalletSuccess.textContent = `Wallet request submitted — ${formatCurrency(amount)} pending approval from Lonwabo`;

          addWalletSuccess.textContent = `Successfully added ${formatCurrency(amount)} to test wallet`;

        walletAmount.value = '';
        selectedClientId.value = '';
        clientSearch.value = '';

        document.getElementById('childSelectionOptions').style.display = 'none';
        selectedClientInfo.style.display = 'none';

        addWalletAlert.style.display = 'block';

    window.approvePendingDeposit = async (transactionId) => {
      try {
        const { data: { session } } = await supabaseClient.auth.getSession();
        const response = await fetch('/api/send-eft-email?action=approve-deposit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${session?.access_token}` },

        });

        if (!response.ok) throw new Error(result.error || 'Failed to approve');
        showToast('Deposit approved successfully!');
        loadPaidEfts();
      } catch (err) {

    window.rejectPendingDeposit = async (transactionId, clientName, amount) => {
      const reason = window.prompt(`Reject this deposit of ${amount} for ${clientName}?\n\nOptional reason (leave blank to skip):`, '');
      if (reason === null) return;
      try {
        const { data: { session } } = await supabaseClient.auth.getSession();
        const response = await fetch('/api/send-eft-email?action=reject-deposit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${session?.access_token}` },
          body: JSON.stringify({ transaction_id: transactionId, reason: reason.trim() || null }),
        });
        const result = await response.json();
        if (!response.ok) throw new Error(result.error || 'Failed to reject');
        showToast('Deposit request rejected.');
        loadPaidEfts();
      } catch (err) {
        showToast(err.message, 'error');

    /* ── Load Users with Wallets ── */
    async function loadPaidEfts() {
      const tableBody = document.getElementById('paidEftTableBody');
      const totalWalletCount = document.getElementById('totalWalletCount');
      const totalWalletAmount = document.getElementById('totalWalletAmount');
      
      const { data: { session } } = await supabaseClient.auth.getSession();
      const currentUserId = session?.user?.id;

      try {
        if (currentEftFilter === 'pending') {
          const resp = await fetch('/api/eft/pending-transactions', {
            headers: { Authorization: `Bearer ${session?.access_token}` }
          });
          if (!resp.ok) {
            const err = await resp.json().catch(() => ({}));
            throw new Error(err.error || `Server error ${resp.status}`);
          }
          const { transactions: txns } = await resp.json();

          if (!txns || txns.length === 0) {
            tableBody.innerHTML = '<tr><td colspan="5" class="empty-state">No pending approvals</td></tr>';
            totalWalletCount.textContent = '0';
            totalWalletAmount.textContent = formatCurrency(0);
            return;
          }

          const totalAmount = txns.reduce((sum, t) => sum + (Number(t.amount) || 0), 0);
          totalWalletCount.textContent = txns.length.toString();
          totalWalletAmount.textContent = formatCurrency(totalAmount);

          const userEmail = (session?.user?.email || '').toLowerCase();
          // Use granular permission from access-guard (falls back to admin check if guard not loaded)
          const _approvePerm = (typeof window.mintCan === 'function')
            ? window.mintCan('eft', 'approve_deposits')
            : (window.mintMe?.role === 'admin');
          const isApprover = !!_approvePerm;

          tableBody.innerHTML = txns.map(txn => {
            const p = txn.profile || {};
            const dateStr = new Date(txn.created_at).toLocaleDateString('en-ZA');
            const parentName = `${p.first_name || ''} ${p.last_name || ''}`.trim() || '—';
            const safeClientName = parentName.replace(/'/g, "\\'");
            const safeAmount = formatCurrency(txn.amount).replace(/'/g, "\\'");
            const actionCell = isApprover
              ? `<div style="display:flex;gap:6px;">
                   <button class="btn btn-primary" style="padding:6px 12px;font-size:11px;background:#059669;" onclick="approvePendingDeposit('${txn.id}')">Approve</button>
                   <button class="btn btn-primary" style="padding:6px 12px;font-size:11px;background:#ef4444;" onclick="rejectPendingDeposit('${txn.id}','${safeClientName}','${safeAmount}')">Reject</button>
                 </div>`
              : `<span style="color:#f59e0b;font-weight:600;font-size:12px;">Pending</span>`;

            return `
              <tr>
                <td style="color:#94a3b8;">${dateStr}</td>
                <td style="font-weight:600;color:#1e293b;">${parentName}</td>
                <td style="font-weight:700;color:#f59e0b;">+${formatCurrency(txn.amount)}</td>
                <td style="font-family:monospace;color:#7c3aed;font-weight:600;">Pending Deposit</td>
                <td>${actionCell}</td>
              </tr>
            `;
          }).join('');
          return;
        }

        // Fetch regular active or test wallets
        const { data: wallets, error } = await supabaseClient
          .from('wallets')
          .select('id, user_id, balance, currency, updated_at, created_at, mint_number, mailer, status')
          .eq('status', currentEftFilter)
          .gt('balance', 0)
          .order('updated_at', { ascending: false });

        if (error) throw error;

        if (!wallets || wallets.length === 0) {
          tableBody.innerHTML = '<tr><td colspan="4" class="empty-state">No users with wallet balance</td></tr>';
          totalWalletCount.textContent = '0';
          totalWalletAmount.textContent = formatCurrency(0);
          return;
        }

        const userIds = wallets.map(w => w.user_id).filter(Boolean);
        let profilesMap = {};

        if (userIds.length > 0) {
          const { data: profiles } = await supabaseClient
            .from('profiles')
            .select('id, first_name, last_name, mint_number, email')
            .in('id', userIds);
          if (profiles) {
            profiles.forEach(p => { profilesMap[p.id] = p; });
          }
        }

        // Load children for all parents
        const { data: children } = await supabaseClient
          .from('family_members')
          .select('id, first_name, last_name, available_balance, parent_id')
          .eq('relationship', 'child');

        childrenByParent = {};
        if (children) {
          children.forEach(child => {
            if (!childrenByParent[child.parent_id]) {
              childrenByParent[child.parent_id] = [];
            }
            childrenByParent[child.parent_id].push(child);
          });
        }

        const generateReference = (userId, firstName) => {
          if (!userId || !firstName) return '—';
          const first4Letters = firstName.substring(0, 4).toUpperCase();
          const last4Digits = userId.slice(-4).toLowerCase();
          return `${first4Letters}-${last4Digits}`;
        };

        const totalAmount = wallets.reduce((sum, w) => sum + (Number(w.balance) || 0), 0);
        totalWalletCount.textContent = wallets.length.toString();
        totalWalletAmount.textContent = formatCurrency(totalAmount);

        tableBody.innerHTML = wallets
          .map(wallet => {
            const p = profilesMap[wallet.user_id] || {};
            const lastUpdate = new Date(wallet.updated_at).toLocaleDateString('en-ZA');
            const reference = wallet.mint_number || p.mint_number || generateReference(wallet.user_id, p.first_name);
            const hasChildren = childrenByParent[wallet.user_id] && childrenByParent[wallet.user_id].length > 0;
            const parentName = `${p.first_name || ''} ${p.last_name || ''}`;
            const isSent = wallet.mailer === 'sent';
            
            const actionButton = isSent
              ? `<span style="color:#059669;font-weight:600;font-size:12px;">Sent</span>`
              : `<button class="btn btn-primary" style="padding:6px 12px;font-size:11px;" onclick="sendWalletEmail('${wallet.id}', '${p.email || ''}', '${p.first_name || ''}', '${reference}', '${wallet.balance}', '${wallet.currency || 'ZAR'}', '${wallet.created_at}')">Send</button>`;

            const childrenHtml = hasChildren
              ? childrenByParent[wallet.user_id]
                  .map(child => `
                    <tr class="child-row" style="display:none;background:#f8fafc;" data-parent-id="${wallet.user_id}" data-child-id="${child.id}">
                      <td style="color:#94a3b8;"></td>
                      <td style="color:#64748b;padding-left:40px;"><span style="color:#7c3aed;font-weight:600;">↳</span> ${child.first_name} ${child.last_name} <span style="color:#7c3aed;font-size:11px;font-weight:600;">(Child)</span> <span style="color:#94a3b8;font-size:12px;">- Managed by ${parentName}</span></td>
                      <td style="font-weight:700;color:#059669;">${formatCurrency((child.available_balance || 0) / 100)}</td>
                      <td></td>
                      <td></td>
                    </tr>
                  `).join('')
              : '';

            return `
              <tr class="parent-row" data-parent-id="${wallet.user_id}">
                <td style="color:#94a3b8;">${lastUpdate}</td>
                <td style="font-weight:600;color:#1e293b;cursor:${hasChildren ? 'pointer' : 'default'};" class="parent-name" data-client-id="${wallet.user_id}" data-client-name="${parentName}">${parentName}${hasChildren ? ' <span style="color:#7c3aed;">▼</span>' : ''}</td>
                <td style="font-weight:700;color:#059669;">${formatCurrency(wallet.balance)}</td>
                <td style="font-family:monospace;color:#7c3aed;font-weight:600;">${reference}</td>
                <td>${actionButton}</td>
              </tr>
              ${childrenHtml}
            `;
          })
          .join('');

        // Add click handlers for expandable parent rows
        document.querySelectorAll('.parent-name').forEach(nameCell => {
          const parentRow = nameCell.closest('.parent-row');
          const parentId = parentRow.dataset.parentId;
          const childRows = document.querySelectorAll(`.child-row[data-parent-id="${parentId}"]`);

          if (childRows.length > 0) {
            nameCell.addEventListener('click', (e) => {
              e.stopPropagation();
              childRows.forEach(row => {
                row.style.display = row.style.display === 'none' ? 'table-row' : 'none';
              });
              const arrowSpan = nameCell.querySelector('span');
              if (arrowSpan) {
                arrowSpan.textContent = arrowSpan.textContent === '▼' ? '▶' : '▼';
              }
            });
          }
        });

        // Add click handlers for child rows to select them in form
        document.querySelectorAll('.child-row').forEach(row => {
          const childCell = row.querySelector('td:nth-child(2)');
          if (childCell) {
            childCell.style.cursor = 'pointer';
            childCell.addEventListener('click', (e) => {
              e.stopPropagation();
              const childId = row.dataset.childId;
              const childName = childCell.textContent.match(/↳\s+([^(]+)/)[1].trim();
              selectedClientId.value = childId;
              clientSearch.value = childName;
              selectedClientName.textContent = childName;
              document.getElementById('selectedClientType').value = 'child';
              selectedClientInfo.style.display = 'block';
              searchSuggestions.classList.remove('show');
            });
          }
        });
      } catch (err) {
        tableBody.innerHTML = `<tr><td colspan="5" class="empty-state">Error: ${err.message}</td></tr>`;
      }
    }

    // Apply granular UI permissions

        display: 'flex',
        alignItems: 'center',
        gap: '8px'

      const icon = document.createElement('span');
      icon.innerHTML = type === 'success' ? '&#10004;' : '&#9888;';
      toast.prepend(icon);
      
      document.body.appendChild(toast);
      
      requestAnimationFrame(() => {
        toast.style.opacity = '1';
        toast.style.transform = 'translateY(0)';

    };

  <script>
    (function() {
      var h = document.documentElement;
      var sk = document.getElementById('pageSkeleton');
      h.style.transition = 'opacity 0.22s ease';
      h.style.opacity = '1';
      function hideSkeleton() {
        if (!sk) return;
        sk.style.opacity = '0';
        setTimeout(function() { if (sk) sk.style.display = 'none'; }, 300);
        sk = null;
      }
      window.__hideSkeleton = hideSkeleton;
      window.addEventListener('load', function() { setTimeout(hideSkeleton, 300); });
      window.addEventListener('pagehide', function() { h.style.transition = 'none'; h.style.opacity = '0'; });
      window.addEventListener('pageshow', function(e) {
        if (e.persisted) { h.style.transition = 'opacity 0.2s ease'; h.style.opacity = '1'; }
      });
      document.addEventListener('click', function(e) {
        var link = e.target.closest('a.nav-icon');
        if (!link) return;
        var href = link.getAttribute('href');
        if (!href || href === '#') return;
        e.preventDefault();
        h.style.transition = 'opacity 0.12s ease';
        h.style.opacity = '0';
        setTimeout(function() { window.location.href = href; }, 120);
      });
    })();
  </script>
